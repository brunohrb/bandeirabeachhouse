name: Smoobu Daily Sync

on:
  schedule:
    - cron: '0 11 * * *'  #  8h São Paulo
    - cron: '0 12 * * *'  #  9h São Paulo
    - cron: '0 13 * * *'  # 10h São Paulo
    - cron: '0 14 * * *'  # 11h São Paulo
    - cron: '0 15 * * *'  # 12h São Paulo
    - cron: '0 16 * * *'  # 13h São Paulo
    - cron: '0 17 * * *'  # 14h São Paulo
    - cron: '0 18 * * *'  # 15h São Paulo
    - cron: '0 19 * * *'  # 16h São Paulo
    - cron: '0 20 * * *'  # 17h São Paulo
    - cron: '0 21 * * *'  # 18h São Paulo
    - cron: '0 22 * * *'  # 19h São Paulo
    - cron: '0 23 * * *'  # 20h São Paulo
  workflow_dispatch:  # Permite rodar manualmente pela interface do GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: scripts

      - name: Run Smoobu sync
        run: node smoobu-sync.js
        working-directory: scripts
        env:
          SMOOBU_API_KEY: ${{ secrets.SMOOBU_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
