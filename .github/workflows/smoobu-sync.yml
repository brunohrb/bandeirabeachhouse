name: Smoobu Daily Sync

on:
  schedule:
    - cron: '0 9 * * *'   # 9h UTC = 6h São Paulo (verão) / 6h (padrão)
    - cron: '0 21 * * *'  # 21h UTC — segunda sync diária para pegar atualizações do dia
  workflow_dispatch:  # Permite rodar manualmente pela interface do GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: scripts

      - name: Run Smoobu sync
        run: node smoobu-sync.js
        working-directory: scripts
        env:
          SMOOBU_API_KEY: ${{ secrets.SMOOBU_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
